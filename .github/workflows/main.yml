name: Market Bot

on:
  schedule:
    # --- WEEKDAYS (Monday to Friday) ---
    # 9:15 AM IST to 3:15 PM IST (Hourly)
    # 45 mins + (3,4,5,6,7,8,9) UTC hours = 9:15, 10:15... 3:15 IST
    - cron: '45 3,4,5,6,7,8,9 * * 1-5'
    
    # 4:15 PM IST = 10:45 UTC
    - cron: '45 10 * * 1-5'

    # --- WEEKENDS (Saturday & Sunday) ---
    # 9 AM, 12 PM, 5 PM, 9 PM IST
    - cron: '30 3,6,11,15 * * 6,0'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install yfinance requests pytz

      - name: Run Bot
        # FIXED: Merged the environment variables and the run command into one step
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python market_bot.py
