name: Market Bot

on:
  schedule:
    # --- WEEKDAYS: ON THE HOUR (9:00 AM to 4:00 PM IST) ---
    - cron: '30 3 * * 1-5'   # 09:00 AM IST
    - cron: '30 4 * * 1-5'   # 10:00 AM IST
    - cron: '30 5 * * 1-5'   # 11:00 AM IST
    - cron: '30 6 * * 1-5'   # 12:00 PM IST
    - cron: '30 7 * * 1-5'   # 01:00 PM IST
    - cron: '30 8 * * 1-5'   # 02:00 PM IST
    - cron: '30 9 * * 1-5'   # 03:00 PM IST
    - cron: '30 10 * * 1-5'  # 04:00 PM IST

    # --- WEEKDAYS: 15 MINS PAST (9:15 AM to 4:15 PM IST) ---
    - cron: '45 3 * * 1-5'   # 09:15 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '45 5 * * 1-5'   # 11:15 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '45 7 * * 1-5'   # 01:15 PM IST
    - cron: '45 8 * * 1-5'   # 02:15 PM IST
    - cron: '45 9 * * 1-5'   # 03:15 PM IST
    - cron: '45 10 * * 1-5'  # 04:15 PM IST

    # --- WEEKENDS (Saturday & Sunday) ---
    - cron: '30 3 * * 6,0'   # 09:00 AM IST
    - cron: '30 6 * * 6,0'   # 12:00 PM IST
    - cron: '30 11 * * 6,0'  # 05:00 PM IST
    - cron: '30 15 * * 6,0'  # 09:00 PM IST

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install yfinance requests pytz

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python market_bot.py
