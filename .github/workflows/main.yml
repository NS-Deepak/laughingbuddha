name: Market Bot

on:
  schedule:
    # --- WEEKDAYS (Monday to Friday) ---
    # 9:15 AM IST to 3:15 PM IST (Hourly)
    # 9:15 AM IST  = 03:45 UTC
    # 10:15 AM IST = 04:45 UTC
    # ... up to ...
    # 3:15 PM IST  = 09:45 UTC
    - cron: '45 3,4,5,6,7,8,9 * * 1-5'
    
    # 4:15 PM IST = 10:45 UTC
    - cron: '45 10 * * 1-5'

    # --- WEEKENDS (Saturday & Sunday) ---
    # 9:00 AM IST = 03:30 UTC
    - cron: '30 3 * * 6,0'
    
    # 12:00 PM IST = 06:30 UTC
    - cron: '30 6 * * 6,0'
    
    # 5:00 PM IST = 11:30 UTC
    - cron: '30 11 * * 6,0'
    
    # 9:00 PM IST = 15:30 UTC
    - cron: '30 15 * * 6,0'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install yfinance requests pytz

      - name: Run Bot
        run: python your_script_name.py
        env:
          # These grab the passwords from your Settings
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python market_bot.py
