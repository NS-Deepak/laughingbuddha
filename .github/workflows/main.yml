name: 🚀 Market Bot

on:
  schedule:
    # CRON SYNTAX: 'Minute Hour * * Day' (UTC Time)
    # Run every minute for real-time data
    - cron: '* * * * *'
    
    # Legacy - kept for reference
    # Every 15 minutes
    # - cron: '*/15 * * * *'
    
    # Market hours
    # 10:00 AM IST = 04:30 UTC
    # - cron: '30 4 * * 1-5'

  # Manual trigger with optional inputs
  workflow_dispatch:
    inputs:
      custom_message:
        description: 'Optional custom message to include'
        required: false
        default: ''

# Prevent concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-bot:
    name: 📊 Fetch & Send Market Update
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests pytz psycopg2-binary

      - name: 🤖 Run Scheduler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/scheduler.py

      - name: ✅ Success notification
        if: success()
        run: |
          echo "## ✅ Market Update Sent Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failure notification
        if: failure()
        run: |
          echo "## ❌ Market Bot Failed" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Error:** Check logs above for details" >> $GITHUB_STEP_SUMMARY
